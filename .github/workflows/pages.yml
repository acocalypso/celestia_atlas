name: Deploy Celestia Atlas to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Generate DSO image index
        run: python tools/build_dso_image_index.py

      - name: Assemble static website
        run: |
          mkdir -p _site

          cp index.html _site/
          cp app.js _site/
          cp app-v7.js _site/
          cp milky-way-renderer.js _site/
          cp catalog.js _site/
          cp dso-images.js _site/
          cp styles.css _site/
          cp manifest.webmanifest _site/
          cp service-worker.js _site/
          cp .nojekyll _site/

          if [ -d assets ]; then
            cp -R assets _site/assets
          fi

          if [ -d images ]; then
            cp -R images _site/images
          fi

          echo "Deployment contents:"
          find _site -maxdepth 3 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
