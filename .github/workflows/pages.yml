name: Deploy Celestia Atlas to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  OPENNGC_VERSION: v20260501
  STELLARIUM_VERSION: v26.2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install catalogue build dependencies
        run: python -m pip install -r tools/requirements-catalog.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build distributable OpenNGC catalogue
        run: python tools/build_dso_catalog.py --catalogues openngc --openngc-version "$OPENNGC_VERSION"

      - name: Build redistributable Stellarium nebula supplement
        run: python tools/build_stellarium_supplement.py --version "$STELLARIUM_VERSION"

      - name: Build pinned Abell planetary-nebula layer
        run: python tools/build_abell_pn_catalog.py

      - name: Build redistributable HYG naked-eye star layer
        run: python tools/build_hyg_star_catalog.py

      - name: Run catalogue and browser-core tests
        run: npm test

      - name: Generate local DSO image index
        run: python tools/build_dso_image_index.py

      - name: Validate generated files
        run: |
          test -s dso-catalog.js
          test -s stellarium-supplement.js
          test -s abell-pn-catalog.js
          test -s hyg-star-catalog.js
          test -s data/dso-catalog.json
          test -s data/dso-viewer-catalog.json
          test -s data/catalog-sources.json
          test -s data/openngc-catalog.json
          test -s data/openngc-viewer-catalog.json
          test -s data/stellarium-dso-supplement.json
          test -s data/stellarium-supplement-meta.json
          test -s data/abell-pn-catalog.json
          test -s data/hyg-star-catalog.json
          test -s data/sources/simbad/a66-2026-07-15.tsv
          test -s data/sources/simbad/a66-2026-07-15.adql
          test -s data/sources/simbad/a66-2026-07-15.meta.json
          test -s licenses/Stellarium-GPL-2.0.txt
          test -s licenses/HYG-CC-BY-SA-4.0.md
          test -s licenses/SIMBAD-ODbL-1.0.md
          python - <<'PY'
          import json
          from pathlib import Path
          payload=json.loads(Path('data/dso-catalog.json').read_text(encoding='utf-8'))
          viewer=json.loads(Path('data/dso-viewer-catalog.json').read_text(encoding='utf-8'))
          count=len(payload.get('objects', []))
          print(f'Distributable catalogue objects: {count:,}')
          if count < 1000:
            raise SystemExit('Generated catalogue is unexpectedly small')
          if len(viewer.get('objects', [])) != count:
            raise SystemExit('Viewer catalogue count does not match source catalogue')
          supplement=json.loads(Path('data/stellarium-dso-supplement.json').read_text(encoding='utf-8'))
          supplement_meta=json.loads(Path('data/stellarium-supplement-meta.json').read_text(encoding='utf-8'))
          supplement_objects=supplement.get('objects', [])
          print(f'Stellarium supplement objects: {len(supplement_objects):,}')
          if len(supplement_objects) != 8658:
            raise SystemExit('Stellarium supplement does not match its pinned row count')
          if supplement.get('meta') != supplement_meta:
            raise SystemExit('Stellarium supplement metadata files disagree')
          if supplement_meta.get('catalogueGroups') != ['abell', 'barnard', 'lbn', 'ldn', 'rcw', 'sharpless', 'vdb']:
            raise SystemExit('Stellarium supplement catalogue groups are incomplete')
          if not any('abell' in item.get('catalogueGroups', []) for item in supplement_objects):
            raise SystemExit('Stellarium supplement contains no Abell/ACO records')
          if not any('ldn' in item.get('catalogueGroups', []) for item in supplement_objects):
            raise SystemExit('Stellarium supplement contains no LDN records')
          abell_pn=json.loads(Path('data/abell-pn-catalog.json').read_text(encoding='utf-8'))
          abell_pn_objects=abell_pn.get('objects', [])
          print(f'Abell planetary nebulae: {len(abell_pn_objects):,}')
          if len(abell_pn_objects) != 86 or abell_pn.get('meta', {}).get('objectCount') != 86:
            raise SystemExit('Abell planetary-nebula layer does not match its pinned row count')
          abell39=next((item for item in abell_pn_objects if item.get('id') == 'Abell PN 39'), None)
          if not abell39 or 'Abell 39' not in abell39.get('aliases', []):
            raise SystemExit('Abell planetary-nebula search aliases are missing')
          if abell_pn.get('meta', {}).get('sourceSha256') != '1aac0fb91c4ae39581b86a6bf1e8cc2fbdeaa93d0460762f73df59dd7e501348':
            raise SystemExit('Abell planetary-nebula snapshot hash changed')
          hyg=json.loads(Path('data/hyg-star-catalog.json').read_text(encoding='utf-8'))
          hyg_stars=hyg.get('stars', [])
          print(f'HYG naked-eye stars: {len(hyg_stars):,}')
          if len(hyg_stars) != 8780 or hyg.get('meta', {}).get('objectCount') != 8780:
            raise SystemExit('HYG naked-eye layer does not match its pinned row count')
          if not any(item.get('name') == 'Larawag' for item in hyg_stars):
            raise SystemExit('HYG named-star records are missing')
          if any(item.get('mag', 99) > 6.5 for item in hyg_stars):
            raise SystemExit('HYG layer exceeds its pinned magnitude limit')
          PY

      - name: Exercise generated atlas in Chrome and inspect browser errors
        env:
          SMOKE_QUERY: LDN 1
          SMOKE_EXPECT_TITLE: LDN 1
          SMOKE_EXPECTED_SOURCE_FILTERS: "9"
          SMOKE_EXPECTED_STAR_COUNT: "8910"
          SMOKE_EXPECTED_DSO_COUNT: "21191"
          SMOKE_EXPECT_DETAIL_TEXT: LDN via Stellarium
        run: npm run test:browser

      - name: Exercise Abell catalogue objects in Chrome
        env:
          SMOKE_QUERY: Abell 1656
          SMOKE_EXPECT_TITLE: Abell 1656
          SMOKE_EXPECTED_SOURCE_FILTERS: "9"
          SMOKE_EXPECTED_STAR_COUNT: "8910"
          SMOKE_EXPECTED_DSO_COUNT: "21191"
          SMOKE_EXPECT_DETAIL_TEXT: Abell via Stellarium
        run: npm run test:browser

      - name: Exercise Abell planetary nebulae in Chrome
        env:
          SMOKE_QUERY: Abell 39
          SMOKE_EXPECT_TITLE: Abell PN 39
          SMOKE_EXPECTED_SOURCE_FILTERS: "9"
          SMOKE_EXPECTED_STAR_COUNT: "8910"
          SMOKE_EXPECTED_DSO_COUNT: "21191"
          SMOKE_EXPECT_DETAIL_TEXT: SIMBAD A66
        run: npm run test:browser

      - name: Exercise expanded HYG stars in Chrome
        env:
          SMOKE_QUERY: Larawag
          SMOKE_EXPECT_TITLE: Larawag
          SMOKE_EXPECTED_SOURCE_FILTERS: "9"
          SMOKE_EXPECTED_STAR_COUNT: "8910"
          SMOKE_EXPECTED_DSO_COUNT: "21191"
          SMOKE_EXPECT_DETAIL_TEXT: HYG
        run: npm run test:browser

      - name: Exercise optional catalogue objects in Chrome
        env:
          SMOKE_CATALOG_BUNDLE: .cache/catalog-browser-fixture/dso-catalog.js
          SMOKE_QUERY: Sh 2-1
          SMOKE_EXPECTED_SOURCE_FILTERS: "11"
          SMOKE_EXPECTED_STAR_COUNT: "8910"
          SMOKE_EXPECT_DETAIL_TEXT: VII/20
        run: |
          python tools/build_catalog_browser_fixture.py
          npm run test:browser

      - name: Assemble static website
        run: |
          mkdir -p _site

          cp index.html _site/
          cp app.js _site/
          cp app-v8.js _site/
          cp standalone-app.js _site/
          cp standalone-engine-bridge.js _site/
          cp milky-way-renderer.js _site/
          cp catalog.js _site/
          cp hyg-star-catalog.js _site/
          cp dso-catalog.js _site/
          cp abell-pn-catalog.js _site/
          cp stellarium-supplement.js _site/
          cp dso-images.js _site/
          cp styles.css _site/
          cp standalone.css _site/
          cp manifest.webmanifest _site/
          cp service-worker.js _site/
          cp .nojekyll _site/
          cp THIRD_PARTY_NOTICES.md _site/

          if [ -d vendor ]; then
            cp -R vendor _site/vendor
          fi

          if [ -d assets ]; then
            cp -R assets _site/assets
          fi

          if [ -d images ]; then
            cp -R images _site/images
          fi

          if [ -d data ]; then
            cp -R data _site/data
          fi

          if [ -d docs ]; then
            cp -R docs _site/docs
          fi

          cp -R licenses _site/licenses

          if [ -d src ]; then
            cp -R src _site/src
          fi

          test -s _site/licenses/Stellarium-GPL-2.0.txt
          test -s _site/licenses/HYG-CC-BY-SA-4.0.md
          test -s _site/licenses/SIMBAD-ODbL-1.0.md

          echo "Deployment contents:"
          find _site -maxdepth 3 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
