name: Deploy Celestia Atlas to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  OPENNGC_VERSION: v20260501

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install catalogue build dependencies
        run: python -m pip install -r tools/requirements-catalog.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build distributable OpenNGC catalogue
        run: python tools/build_dso_catalog.py --catalogues openngc --openngc-version "$OPENNGC_VERSION"

      - name: Run catalogue and browser-core tests
        run: npm test

      - name: Generate local DSO image index
        run: python tools/build_dso_image_index.py

      - name: Validate generated files
        run: |
          test -s dso-catalog.js
          test -s data/dso-catalog.json
          test -s data/dso-viewer-catalog.json
          test -s data/catalog-sources.json
          test -s data/openngc-catalog.json
          test -s data/openngc-viewer-catalog.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload=json.loads(Path('data/dso-catalog.json').read_text(encoding='utf-8'))
          viewer=json.loads(Path('data/dso-viewer-catalog.json').read_text(encoding='utf-8'))
          count=len(payload.get('objects', []))
          print(f'Distributable catalogue objects: {count:,}')
          if count < 1000:
            raise SystemExit('Generated catalogue is unexpectedly small')
          if len(viewer.get('objects', [])) != count:
            raise SystemExit('Viewer catalogue count does not match source catalogue')
          PY

      - name: Exercise generated atlas in Chrome and inspect browser errors
        run: npm run test:browser

      - name: Assemble static website
        run: |
          mkdir -p _site

          cp index.html _site/
          cp app.js _site/
          cp app-v8.js _site/
          cp standalone-app.js _site/
          cp standalone-engine-bridge.js _site/
          cp milky-way-renderer.js _site/
          cp catalog.js _site/
          cp dso-catalog.js _site/
          cp dso-images.js _site/
          cp styles.css _site/
          cp standalone.css _site/
          cp manifest.webmanifest _site/
          cp service-worker.js _site/
          cp .nojekyll _site/
          cp THIRD_PARTY_NOTICES.md _site/

          if [ -d vendor ]; then
            cp -R vendor _site/vendor
          fi

          if [ -d assets ]; then
            cp -R assets _site/assets
          fi

          if [ -d images ]; then
            cp -R images _site/images
          fi

          if [ -d data ]; then
            cp -R data _site/data
          fi

          if [ -d docs ]; then
            cp -R docs _site/docs
          fi

          if [ -d src ]; then
            cp -R src _site/src
          fi

          echo "Deployment contents:"
          find _site -maxdepth 3 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
